<!DOCTYPE html>
<html lang="en">
<head>

<title>Phantom by Revolut — Campaign Deck</title>
<style>
  body { background: #06060e; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
  a { font-family: monospace; color: #8b5cf6; text-decoration: none; }
</style>
  <meta name="theme-color" content="#06060e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Phantom">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">

</head>
<body>
<a href="slide-01.html">Loading Phantom...</a>
<script>location.replace("slide-01.html");</script>
<style id="pwa-nav-mobile">
@media (max-width:768px){
  .pnav-btn{width:44px!important;height:44px!important;font-size:18px!important;}
  #phantom-nav{bottom:14px;padding:6px 8px;}
  .pnav-label{font-size:9px;min-width:56px;}
}
</style>
<script id="phantom-pwa">
// Proportional slide scaler — fits any screen while preserving 16:9
(function(){
  function scale(){
    var s=document.querySelector('.slide');
    if(!s)return;
    var sc=Math.min(window.innerWidth/1280,window.innerHeight/720);
    s.style.transform='scale('+sc+')';
    s.style.transformOrigin='center center';
  }
  window.addEventListener('resize',scale);
  window.addEventListener('orientationchange',function(){setTimeout(scale,200);});
  if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',scale);}
  else{scale();}
})();
// Touch / swipe navigation
(function(){
  var sx=0,sy=0;
  document.addEventListener('touchstart',function(e){
    sx=e.changedTouches[0].clientX;
    sy=e.changedTouches[0].clientY;
  },{passive:true});
  document.addEventListener('touchend',function(e){
    var dx=e.changedTouches[0].clientX-sx;
    var dy=e.changedTouches[0].clientY-sy;
    if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>48){
      var id=dx<0?'pnav-next':'pnav-prev';
      var btn=document.getElementById(id);
      if(btn&&!btn.disabled)btn.click();
    }
  },{passive:true});
})();
// Service worker
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('./sw.js').catch(function(){});
  });
}
</script>
</body>
</html>
